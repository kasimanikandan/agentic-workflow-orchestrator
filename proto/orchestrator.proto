syntax = "proto3";

package orchestrator.v1;

// The gRPC contract between the (Go) orchestration engine and the thin native
// SDK clients (Python, Java, JS/TS). The engine owns scheduling, concurrency,
// rate limiting and the report; clients author specs and execute skill handlers.

service Orchestrator {
  // Submit a workflow run. The engine drives execution and streams events back.
  // The client also services skill invocations on this same bidi stream.
  rpc Execute(stream ClientMessage) returns (stream EngineMessage);

  // Fetch the final (or current) report for a run.
  rpc GetReport(GetReportRequest) returns (Report);

  // Cancel an in-flight run (cooperative cancellation propagates to handlers).
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
}

// ---- Bidirectional stream messages ----

// Client -> Engine
message ClientMessage {
  oneof body {
    StartRun start_run = 1;       // begin a run (carries the spec + inputs)
    SkillResult skill_result = 2; // result of a SkillInvocation the engine sent
    CancelRunRequest cancel = 3;
  }
}

// Engine -> Client
message EngineMessage {
  oneof body {
    RunAccepted run_accepted = 1;
    SkillInvocation skill_invocation = 2; // "please run this skill handler now"
    Event event = 3;                      // task.started, decision.recorded, ...
    Report report = 4;                    // final report when the run completes
  }
}

// ---- Run lifecycle ----

message StartRun {
  // The workflow template as canonical JSON (validated against spec.schema.json).
  string spec_json = 1;
  // Run inputs as JSON object.
  string inputs_json = 2;
}

message RunAccepted { string run_id = 1; }

message GetReportRequest { string run_id = 1; }
message CancelRunRequest { string run_id = 1; string reason = 2; }
message CancelRunResponse { bool cancelled = 1; }

// ---- Skill dispatch ----

message SkillInvocation {
  string run_id = 1;
  string task_id = 2;
  string skill = 3;
  string inputs_json = 4; // resolved inputs for this task
  int32 attempt = 5;      // 1-based retry attempt
  string invocation_id = 6;
}

message SkillResult {
  string invocation_id = 1;
  oneof outcome {
    string output_json = 2; // success: handler return value
    SkillError error = 3;   // failure
  }
  repeated Decision decisions = 4; // critical decisions recorded by the handler
  LlmUsage llm_usage = 5;          // optional, if the handler called an LLM
}

message SkillError { string type = 1; string message = 2; bool retryable = 3; }

// ---- Events, decisions, usage ----

message Event {
  string run_id = 1;
  string task_id = 2;
  string type = 3; // task.started | task.succeeded | task.failed | task.skipped | decision.recorded
  int64 at_unix_ms = 4;
  string data_json = 5;
}

message Decision {
  int64 at_ms = 1;       // ms since task start
  string summary = 2;
  string rationale = 3;
  string data_json = 4;
}

message LlmUsage {
  string provider = 1;
  string model = 2;
  int64 tokens_in = 3;
  int64 tokens_out = 4;
}

// ---- Report ----

message Report {
  string workflow = 1;
  string run_id = 2;
  string status = 3;          // succeeded | failed | cancelled
  int64 started_at_unix_ms = 4;
  int64 duration_ms = 5;
  repeated TaskSpan tasks = 6;
  repeated string critical_path = 7;
  Totals totals = 8;
  repeated string errors = 9;
  string output_json = 10;    // resolved workflow output
}

message TaskSpan {
  string id = 1;
  string status = 2;          // succeeded | failed | skipped
  int64 duration_ms = 3;
  int32 attempts = 4;
  LlmUsage llm = 5;
  repeated Decision decisions = 6;
  string error = 7;
}

message Totals {
  int64 llm_tokens_in = 1;
  int64 llm_tokens_out = 2;
  int64 tool_calls = 3;
  int64 retries = 4;
}
